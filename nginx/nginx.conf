# ══════════════════════════════════════════════════════════════════════
# Nginx — Reverse Proxy seguro para Tribunal IA Portugal V7
# TLS 1.3, HSTS, CSP, rate limiting, sem versão exposta
# ══════════════════════════════════════════════════════════════════════

# Esconder versão do nginx
server_tokens off;

# Rate limiting global por IP
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# ── Redirect HTTP → HTTPS ─────────────────────────────────────────────
server {
    listen 80;
    server_name _;

    # Health check para o docker healthcheck (sem redirect)
    location /health {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS principal ───────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name tribunal-ia.gov.pt;  # Alterar para domínio real

    # TLS — apenas 1.2 e 1.3
    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache   shared:SSL:10m;
    ssl_stapling        on;
    ssl_stapling_verify on;

    # Limite de conexões simultâneas por IP
    limit_conn conn_limit 20;

    # Tamanho máximo de upload (descrições de casos)
    client_max_body_size 1m;

    # ── Headers de segurança ─────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none';" always;
    # Remover headers que revelam tecnologia
    more_clear_headers Server;
    more_clear_headers X-Powered-By;

    # ── Interface Streamlit ──────────────────────────────────────────
    location / {
        limit_req zone=api burst=10 nodelay;
        proxy_pass         http://tribunal-ui:8501;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # ── API REST ─────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        rewrite ^/api/(.*) /$1 break;
        proxy_pass         http://tribunal-ia:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # Rate limit mais apertado no endpoint de autenticação (anti brute-force)
    location /api/auth/token {
        limit_req zone=login burst=3 nodelay;
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://tribunal-ia:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Métricas Prometheus — apenas rede interna ────────────────────
    location /metrics {
        # Bloquear acesso externo a métricas
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
        proxy_pass http://tribunal-ia:8000/metrics;
    }

    # Bloquear acesso a docs em produção (openapi_url=None no FastAPI, redundância aqui)
    location ~ ^/(docs|redoc|openapi\.json) {
        return 404;
    }
}
